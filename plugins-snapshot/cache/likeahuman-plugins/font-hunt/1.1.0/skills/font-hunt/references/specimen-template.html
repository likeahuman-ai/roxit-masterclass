<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Hunt — {{brief}}</title>
  {{font_links}}
  <style>{{inline_styles}}</style>
</head>
<body>
  <header class="fh-header">
    <div class="fh-header-brief">
      <span class="fh-label">Font Hunt</span>
      <span class="fh-brief">{{brief}}</span>
    </div>
    <div class="fh-header-meta">
      <span>{{date}}</span>
      <span>·</span>
      <span>{{agents_ran}}</span>
    </div>
    <div class="fh-keys">
      <kbd>J</kbd> / <kbd>K</kbd> navigate · <kbd>C</kbd> copy CSS
    </div>
  </header>

  <main>
    {{sections}}
  </main>

  <footer class="fh-footer">
    <div class="fh-footer-col">
      <span class="fh-label">Anti-slop applied</span>
      <p>{{blocklist_summary}}</p>
    </div>
    <div class="fh-footer-col">
      <span class="fh-label">Sources rotated</span>
      <p>{{sources_rotated}}</p>
    </div>
    <div class="fh-footer-col">
      <span class="fh-label">Regenerate</span>
      <p>Run <code>/font-hunt "{{brief}}"</code> again — rotation will serve new fonts.</p>
    </div>
  </footer>

  <script>{{inline_script}}</script>
</body>
</html>
